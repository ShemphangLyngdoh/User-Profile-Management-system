<!DOCTYPE html>
<html>
<head>
    <title>User Profile System</title>
    <link rel="stylesheet" href="../CSS/style.css">
    <script src="../Javascript/script.js" defer></script>
</head>

<body>

<div class="box">

<h1>User Profile System</h1>
<p id="msg"></p>

<!-- AUTH SECTION -->
<div id="auth">

<h3>Register</h3>
<input type="text" id="rName" placeholder="Name">
<input type="email" id="rEmail" placeholder="Email">
<input type="password" id="rPass" placeholder="Password">
<button onclick="register()">Register</button>

<h3>Login</h3>
<input type="email" id="lEmail" placeholder="Email">
<input type="password" id="lPass" placeholder="Password">
<button onclick="login()">Login</button>

</div>

<!-- DASHBOARD -->
<div id="dash" style="display:none;">
    <h2 id="welcome"></h2>
    <p id="data"></p>

    <input type="text" id="newName" placeholder="New Name">
    <button onclick="update()">Update</button>

    <button onclick="deleteUser()">Delete Account</button>
    <button onclick="logout()">Logout</button>
</div>

</div>

</body>
</html>
